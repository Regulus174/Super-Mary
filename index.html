<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超级玛丽 - Super Mario</title>
    <link rel="stylesheet" href="/Super-Mary/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <!-- 开始菜单 -->
        <div id="menu-screen" class="screen">
            <h1>超级玛丽</h1>
            <div class="menu-options">
                <button id="start-btn" class="menu-btn">开始游戏</button>
                <button id="leaderboard-btn" class="menu-btn">排行榜</button>
                <button id="controls-btn" class="menu-btn">操作说明</button>
            </div>
            <div class="controls-info" id="controls-info" style="display: none;">
                <h3>操作说明</h3>
                <p>← → / A D : 移动</p>
                <p>空格 / Z / W : 跳跃</p>
                <p>X : 发射火球</p>
                <p>P / ESC : 暂停</p>
                <p>Enter : 确认</p>
            </div>
        </div>

        <!-- 暂停菜单 -->
        <div id="pause-screen" class="screen" style="display: none;">
            <h2>游戏暂停</h2>
            <div class="menu-options">
                <button id="resume-btn" class="menu-btn">继续游戏</button>
                <button id="restart-btn" class="menu-btn">重新开始</button>
                <button id="quit-btn" class="menu-btn">返回主菜单</button>
            </div>
        </div>

        <!-- 游戏结束 -->
        <div id="gameover-screen" class="screen" style="display: none;">
            <h2>游戏结束</h2>
            <div id="final-score"></div>
            <div id="name-input-container" style="display: none;">
                <input type="text" id="player-name" placeholder="输入你的名字" maxlength="10">
                <button id="submit-score-btn" class="menu-btn">提交分数</button>
            </div>
            <div class="menu-options">
                <button id="retry-btn" class="menu-btn">再玩一次</button>
                <button id="menu-btn" class="menu-btn">返回主菜单</button>
            </div>
        </div>

        <!-- 排行榜 -->
        <div id="leaderboard-screen" class="screen" style="display: none;">
            <h2>排行榜</h2>
            <div id="leaderboard-list"></div>
            <button id="back-btn" class="menu-btn">返回</button>
        </div>

        <!-- 关卡过渡 -->
        <div id="level-transition" class="screen" style="display: none;">
            <h2 id="level-text"></h2>
        </div>
    </div>

    <!-- 游戏脚本 -->
    <script src="js/constants.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/sound.js"></script>
    <script src="js/physics.js"></script>
    <script src="js/collision.js"></script>
    <script src="js/sprites.js"></script>
    <script src="js/player.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/powerup.js"></script>
    <script src="js/particle.js"></script>
    <script src="js/level.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/leaderboard.js"></script>
    <script src="js/game.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
